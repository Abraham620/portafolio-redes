<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Personas</title>
</head>
<body>

  <h2>Registro</h2>

  <form>
    <input type="text" id="nombre" placeholder="Nombre"><br><br>
    <input type="text" id="apellido" placeholder="Apellido"><br><br>
    <input type="text" id="curso" placeholder="Curso"><br><br>
    <input type="text" id="universidad" placeholder="Universidad"><br><br>

    <button type="button" onclick="guardar()">Guardar</button>
  </form>

  <h3>Datos guardados:</h3>
  <ul id="lista"></ul>

  <script>
    function guardar() {
      let nombre = document.getElementById("nombre").value;
      let apellido = document.getElementById("apellido").value;
      let curso = document.getElementById("curso").value;
      let universidad = document.getElementById("universidad").value;

      let lista = document.getElementById("lista");

      let nuevo = document.createElement("li");
      nuevo.textContent = nombre + " " + apellido + " - " + curso + " - " + universidad;

      lista.appendChild(nuevo);
    }
  </script> <!DOCTYPE html>
<html>
<head>
    <title>Registro de Estudiantes</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head> <style></style><head>
    <title>Registro de Estudiantes</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 40px;
            border-radius: 10px;
        }
    </style>

</head> 
<body>

    <input id="nombre" placeholder="Nombre">
    <input id="apellido" placeholder="Apellido">
    <input id="curso" placeholder="Curso">

    <button onclick="agregar()">Agregar</button>
    <button onclick="exportarExcel()">Exportar Excel</button>

    <table border="1">
        <tbody id="tabla"></tbody>
    </table>

    <script>
        let estudiantes = [];

        function agregar() {
            let nombre = document.getElementById("nombre").value;
            let apellido = document.getElementById("apellido").value;
            let curso = document.getElementById("curso").value;

            estudiantes.push({ nombre, apellido, curso });

            render();

            exportarExcel(); // 👈 AQUÍ VA LA DESCARGA AUTOMÁTICA
        }

        function render() {
            let tabla = document.getElementById("tabla");
            tabla.innerHTML = "";

            estudiantes.forEach(e => {
                tabla.innerHTML += `
                    <tr>
                        <td>${e.nombre}</td>
                        <td>${e.apellido}</td>
                        <td>${e.curso}</td>
                    </tr>
                `;
            });
        }

        function exportarExcel() {
            let ws = XLSX.utils.json_to_sheet(estudiantes);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Estudiantes");
            XLSX.writeFile(wb, "registro_estudiantes.xlsx");
        }
    </script>

</body>
</html>

</body>
</html>
